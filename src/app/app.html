<div style="padding: 20px; font-family: Arial, sans-serif; max-width: 600px;">
  
  <h2>Create a New Session</h2>

  <div *ngIf="state === 'idle'">
    📝 Please fill out the form below to create a new session.
  </div>
  <div *ngIf="state === 'submitting'">
    ⏳ Saving session... Please wait.
  </div>
  <div *ngIf="state === 'success'">
    ✅ Session successfully created!
  </div>

  <app-session-form (sessionCreated)="onSessionCreate($event)" style="margin: 50px;"></app-session-form>

</div>
