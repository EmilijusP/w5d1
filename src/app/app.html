<div style="padding: 20px; font-family: Arial, sans-serif; max-width: 600px;">
  
  <h2>Create a New Session</h2>

  <div *ngIf="state === 'loading'" style="color: blue; margin-bottom: 10px;">
    ⏳ Saving session... Please wait.
  </div>
  <div *ngIf="state === 'success'" style="color: green; margin-bottom: 10px; font-weight: bold;">
    ✅ Session successfully created!
  </div>


  <form (ngSubmit)="onSubmit(sessionForm)" #sessionForm="ngForm">
    
    <div style="margin-bottom: 15px;">
      <label>Session Title *</label><br>
      <!-- [(ngModel)] sujungia šį inputą su tavo TS kintamuoju (dvipusis ryšys) -->
      <input 
        type="text" 
        name="title" 
        [(ngModel)]="newSession.title" 
        required 
        #titleField="ngModel"
        style="width: 100%; padding: 8px;"
      >

      <div *ngIf="titleField.invalid && titleField.touched" style="color: red; font-size: 12px; margin-top: 5px;">
        Title is required!
      </div>
    </div>

    <div style="margin-bottom: 15px;">
      <label>Abstract</label><br>
      <textarea 
        name="abstract" 
        [(ngModel)]="newSession.abstract" 
        style="width: 100%; padding: 8px; height: 80px;">
      </textarea>
    </div>

    <div style="margin-bottom: 15px;">
      <label>Start Time</label><br>
      <input 
        type="text" 
        name="startTime" 
        [(ngModel)]="newSession.startTime" 
        style="width: 100%; padding: 8px;"
      >
    </div>

    <div style="margin-bottom: 15px;">
      <label>End Time</label><br>
      <input 
        type="text" 
        name="endTime" 
        [(ngModel)]="newSession.endTime" 
        style="width: 100%; padding: 8px;"
      >
    </div>

    <button 
      type="submit" 
      [disabled]="sessionForm.invalid || state === 'loading'"
      style="padding: 10px 15px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Save Session
    </button>
  </form>

  <hr style="margin-top: 30px;">

  <!-- json pipe (| json) paima tavo TS objektą ir gražiai jį atspausdina kaip tekstą -->
  <h3>Live Data Preview (Debug)</h3>
  <pre style="background: #f4f4f4; padding: 10px; border-radius: 4px;">{{ newSession | json }}</pre>
  <p><strong>Current State:</strong> {{ state }}</p>

</div>
