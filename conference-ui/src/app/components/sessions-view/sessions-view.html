<ul *ngIf="sessions().length > 0; else noSessionsTemplate">
    <li *ngFor="let session of sessions()" 
        style="margin: 20px; cursor: pointer" 
        appHighlight
        [routerLink]="['/sessions', session.id]"> <strong>{{ session.title }}</strong>
        <p *ngIf="session.abstract">{{ session.abstract }}</p>
        <p>Time: {{ session | sessionTime }}</p>
    </li>
</ul>

<ng-template #noSessionsTemplate>
    <p style="color: #999; text-align: center; padding: 40px; font-size: 16px;">No sessions created yet. Please add a session using the form above.</p>
</ng-template>
