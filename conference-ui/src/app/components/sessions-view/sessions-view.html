
<ul *ngIf="sessions.length > 0; else noSessionsTemplate">
    <li *ngFor="let session of sessions" style="margin: 20px; cursor: pointer" appHighlight>
        <strong>{{ session.title }}</strong>
        <p *ngIf="session.abstract">{{ session.abstract }}</p>
        <p>Schedule: {{ session | sessionTime }}</p>
    </li>
</ul>

<ng-template #noSessionsTemplate>
    <p>No sessions created yet. Please add a session using the form above.</p>
