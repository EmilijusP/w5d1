<form [formGroup]="sessionForm" (ngSubmit)="onSubmit()">
  <div style="margin-bottom: 15px;">
    <label>Session Title *</label><br>
    <input type="text" formControlName="title" style="width: 100%; padding: 8px;">
    
    <div *ngIf="sessionForm.get('title')?.invalid && sessionForm.get('title')?.touched" 
         style="color: red; font-size: 12px; margin-top: 5px;">
      Title is required (min 3 chars).
    </div>
  </div>

  <div style="margin-bottom: 15px;">
    <label>Abstract</label><br>
    <textarea formControlName="abstract" style="width: 100%; padding: 8px; height: 80px;"></textarea>
  </div>

  <div style="margin-bottom: 15px;">
    <label>Start Time</label><br>
    <input type="datetime-local" formControlName="startTime" style="width: 100%; padding: 8px;">
  </div>

  <div style="margin-bottom: 15px;">
    <label>End Time</label><br>
    <input type="datetime-local" formControlName="endTime" style="width: 100%; padding: 8px;">
  </div>

  <button type="submit" [disabled]="sessionForm.invalid"
    style="padding: 10px 15px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer;">
    Save Session
  </button>
</form>
